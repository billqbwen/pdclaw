name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Lint
        run: |
          # Add your linting commands here
          # e.g., ruff check . or pylint *.py
          python -m py_compile pdclaw.py pdca_memory.py pdca_claude_session.py pdca_memory_cli.py

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run tests
        run: |
          # Add your test commands here
          # e.g., pytest
          echo "No tests configured yet"
