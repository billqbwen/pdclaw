[runner]
; Target branch for #Deploy decision (CLI --deploy-branch > this)
deploy_branch = main
; Polling interval in seconds (CLI --interval > this)
interval = 180

[paths]
; Working directory for PDClaw operations (CLI --work-dir > this)
work_dir = ../Service-Management-Board
; Internal state tracking directory (CLI --state-dir > this)
state_dir = .pdca_state
; Memory storage directory (CLI --memory-dir > this)
memory_dir = .pdca/memory
; Skills directory relative to pdclaw.py (not overridable via CLI)
skills_dir = skills
; Metrics storage directory (CLI --metrics-dir > this)
metrics_dir = .pdca/metrics

[ai]
; AI model (CLI --model > this)
model = deepseek-v4-flash
; AI API base URL (CLI --base-url > this)
base_url = https://api.deepseek.com/anthropic

[dashboard]
; Enable local web dashboard (CLI --dashboard/--no-dashboard > this)
enabled = true
; HTTP port (CLI --dashboard-port > this)
port = 9191
